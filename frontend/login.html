<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReliefSync Enterprise — Authorized Access</title>
  <meta name="description" content="Authorized secure access portal for LGU command centers and logistics personnel.">
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="login.css">
</head>
<body>

  <!-- Background security overlay patterns -->
  <div class="secure-bg-overlay"></div>

  <!-- Center Aligned Login Card Container -->
  <main class="login-wrapper">
    <div class="login-card">
      
      <!-- Card Header -->
      <header class="login-header">
        <h1 class="brand-title">ReliefSync Enterprise</h1>
        <p class="brand-subtitle">Authorized Personnel Access Only</p>
      </header>

      <!-- Secure Login Form -->
      <form id="login-form" class="login-form">
        
        <!-- Field 1: Email -->
        <div class="form-group">
          <label for="email-input">Government / LGU Email Address</label>
          <input 
            type="email" 
            id="email-input" 
            placeholder="name@municipality.gov.ph" 
            required 
            autocomplete="email"
          >
        </div>

        <!-- Field 2: Passcode -->
        <div class="form-group">
          <label for="passcode-input">Command Center Passcode</label>
          <input 
            type="password" 
            id="passcode-input" 
            placeholder="••••••••••••" 
            required 
            autocomplete="current-password"
          >
        </div>

        <!-- Field 3: Assigned Command Hub Dropdown -->
        <div class="form-group">
          <label for="hub-select">Assigned Command Hub</label>
          <div class="custom-select-wrapper">
            <select id="hub-select" required>
              <option value="makati">NCR - Makati City MDRRMO ▾</option>
              <option value="quezon">NCR - Quezon City DRRMC ▾</option>
              <option value="manila">NCR - Manila City Disaster Office ▾</option>
            </select>
          </div>
        </div>

        <!-- Submission Button -->
        <button type="submit" id="btn-authenticate" class="auth-btn">
          <span class="btn-text">Authenticate & Open Dashboard</span>
          <span class="btn-spinner hidden">
            <svg class="spinner" viewBox="0 0 50 50">
              <circle class="path" cx="25" cy="25" r="20" fill="none" stroke-width="5"></circle>
            </svg>
            Verifying Credentials...
          </span>
        </button>

      </form>

      <!-- System Warning Disclaimer & Demo Note -->
      <footer class="login-footer">
        <p class="disclaimer-text">
          This system monitors access. Unauthorized configuration attempts will be flagged by municipal infrastructure protocols.
        </p>
        <div style="margin-top: 15px; padding: 10px; border: 1px dashed #999; border-radius: 6px; text-align: center; font-size: 13px; color: #555; background: #f9f9f9;">
          <strong>Demo Credentials</strong><br>
          Email: <code>mdrrmo@makati.ph</code><br>
          Password: <code>makatiMDRRMO</code><br>
          <em style="font-size: 11px; opacity: 0.8;">&lt;&lt; only for prototype demo purposes.</em>
        </div>
      </footer>

    </div>
  </main>

  <script src="login.js"></script>
</body>
</html>
